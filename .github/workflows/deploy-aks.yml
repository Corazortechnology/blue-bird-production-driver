# Build Dockerfile.full → push to ACR → rollout Deployment on AKS (push to main).
# Setup: see docs/github-actions-aks.md
name: Build and deploy to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-aks-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_NAME: bluebirddriversafetyacr
  ACR_LOGIN_SERVER: bluebirddriversafetyacr.azurecr.io
  IMAGE_NAME: api-service
  AKS_RG: rg-bluebird-driver-safety
  AKS_NAME: aks-bluebird-driver-safety
  K8S_NAMESPACE: default
  DEPLOYMENT_NAME: api-service
  CONTAINER_NAME: api-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC to Azure (if you use federated credentials; harmless otherwise)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Service principal + password MUST use `creds` JSON only.
      # If you set client-id + tenant-id + subscription-id, azure/login treats that as OIDC and ignores creds — login fails.
      # Secret AZURE_CREDENTIALS = one JSON: clientId, clientSecret, subscriptionId, tenantId (see docs/github-actions-aks.md).
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        env:
          TAG: ${{ github.sha }}
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${TAG}"
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.full \
            -t "${IMAGE}" \
            -t "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest" \
            --push \
            .

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ env.AKS_RG }}" \
            --name "${{ env.AKS_NAME }}" \
            --overwrite-existing

      - name: Roll out new image
        env:
          TAG: ${{ github.sha }}
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${TAG}"
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}="${IMAGE}" \
            -n "${{ env.K8S_NAMESPACE }}"
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n "${{ env.K8S_NAMESPACE }}" \
            --timeout=10m
